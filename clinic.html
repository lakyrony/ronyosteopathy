<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="קליניקה">
<title>קליניקה — ניהול מטופלים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --g50:#f0faf4;--g100:#d6f0e0;--g200:#a8dcbe;--g400:#4caf7d;--g500:#2e9460;--g600:#1e7a4a;--g700:#145c37;
  --b50:#eef6fb;--b100:#cde5f5;--b400:#4a9fd4;--b600:#1a6fa3;
  --t100:#c5f0e6;--t400:#26b08a;--t500:#1a9070;
  --a50:#fef9ec;--a100:#fdedc5;--a500:#e6a817;--a700:#9a6e00;
  --r50:#fef2f2;--r100:#fdd5d5;--r500:#e53e3e;--r700:#9b1c1c;
  --gr100:#eef1ee;--gr400:#8a9a8a;
  --bg:#f4f8f5;--sf:#fff;--sf2:#f0f6f2;
  --bd:#d4e6d8;--bdl:#e8f2ea;
  --tp:#1a2e1a;--ts:#4a6a4a;--tm:#7a9a7a;
  --ac:#2e9460;--acd:#1e7a4a;
  --rsm:8px;--rmd:12px;--rlg:18px;--rxl:24px;
  --sh:0 1px 3px rgba(30,80,30,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--tp);font-size:15px;direction:rtl}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg)}
.hdr{background:linear-gradient(135deg,var(--g600),var(--g500) 60%,var(--t500));padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hlogo{display:flex;align-items:center;gap:10px}
.hicon{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.htitle{color:#fff;font-size:17px;font-weight:700}
.hsub{color:rgba(255,255,255,0.75);font-size:11px}
.hacts{display:flex;gap:5px}
.hb{background:rgba(255,255,255,0.18);border:none;border-radius:var(--rsm);padding:6px 10px;color:#fff;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
.hb svg{width:13px;height:13px}
.stbar{background:var(--sf);border-bottom:1px solid var(--bdl);padding:6px 16px;display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdot.gr{background:#22c55e}.sdot.ye{background:#f59e0b}.sdot.rd{background:#ef4444}
.qbar{background:var(--sf);border-bottom:1px solid var(--bdl);padding:9px 14px;display:flex;gap:8px;flex-shrink:0}
.qb{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 6px;border-radius:var(--rmd);border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600}
.qbp{background:var(--ac);color:#fff}
.qbs{background:var(--b50);color:var(--b600);border:1px solid var(--b100)}
.qb svg{width:15px;height:15px}
.dalert{background:var(--a50);border-bottom:1px solid var(--a100);padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--a700);flex-shrink:0}
.dalert svg{width:15px;height:15px;flex-shrink:0}
.dal{margin-right:auto;font-weight:600;text-decoration:underline;cursor:pointer}
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;padding:12px}
.screen.active{display:block}
.bnav{background:var(--sf);border-top:1px solid var(--bd);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-size:10px;color:var(--tm)}
.ni.active{color:var(--ac)}
.ni svg{width:21px;height:21px}
.card{background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bdl);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.ct{font-size:12px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.vtabs{display:flex;background:var(--sf2);border-radius:var(--rsm);padding:3px;margin-bottom:12px;gap:2px}
.vt{flex:1;padding:6px 4px;border:none;border-radius:6px;background:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;color:var(--tm);cursor:pointer}
.vt.active{background:#fff;color:var(--ac);font-weight:600;box-shadow:var(--sh)}
.calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.calt{font-size:17px;font-weight:700;color:var(--tp);flex:1;text-align:center}
.caln{background:var(--g50);border:1px solid var(--bd);border-radius:var(--rsm);padding:5px 14px;cursor:pointer;font-size:19px;color:var(--ac);font-family:'Heebo',sans-serif;line-height:1}
/* month */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mdn{text-align:center;font-size:11px;font-weight:600;color:var(--tm);padding:3px 0 7px}
.mday{min-height:44px;border-radius:var(--rsm);padding:3px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:background 0.1s}
.mday:active{background:var(--g50)}
.mday.other .dn{color:var(--gr400)}
.mday.today .dn{background:var(--ac);color:#fff;border-radius:50%}
.mday.sel{background:var(--g50)}
.dn{font-size:13px;font-weight:500;color:var(--tp);width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.ddots{display:flex;gap:2px;justify-content:center}
.dd{width:5px;height:5px;border-radius:50%}
.dd.g{background:var(--ac)}.dd.r{background:var(--r500)}
/* inline day panel */
.daypanel{border-top:1px solid var(--bdl);margin-top:10px;padding-top:10px}
.dphead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dptitle{font-size:13px;font-weight:700;color:var(--tp)}
.dpadd{background:var(--ac);color:#fff;border:none;border-radius:20px;padding:4px 12px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.dpslot{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdl);cursor:pointer}
.dpslot:last-child{border-bottom:none}
.dptime{font-size:12px;color:var(--tm);min-width:38px;font-weight:600}
.dpevt{flex:1;border-radius:6px;padding:7px 10px}
.dpevt-n{font-size:13px;font-weight:600}
.dpevt-s{font-size:11px;margin-top:1px;opacity:0.8}
.dpempty{flex:1;background:var(--sf2);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--tm)}
/* week */
.wgrid{display:grid;grid-template-columns:40px repeat(7,1fr)}
.wtl{height:50px;display:flex;align-items:flex-start;padding-top:2px;font-size:10px;color:var(--tm);justify-content:center}
.wcell{height:50px;border-bottom:1px solid var(--bdl);border-right:1px solid var(--bdl);padding:2px;cursor:pointer}
.wappt{height:100%;border-radius:4px;padding:2px 4px;font-size:10px;font-weight:600;display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wbl{background:var(--b50);color:var(--b600);border-right:3px solid var(--b400)}
.wrd{background:var(--r50);color:var(--r700);border-right:3px solid var(--r500)}
.wgr{background:var(--g50);color:var(--g700);border-right:3px solid var(--g400)}
/* patients */
.swrap{position:relative;margin-bottom:10px}
.swrap svg{position:absolute;right:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--tm)}
.si{width:100%;padding:10px 38px 10px 12px;border:1px solid var(--bd);border-radius:var(--rmd);font-family:'Heebo',sans-serif;font-size:14px;background:var(--sf);color:var(--tp);outline:none}
.si:focus{border-color:var(--ac)}
.pi{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bdl);cursor:pointer}
.pi:last-child{border-bottom:none}
.pav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.avg{background:var(--g100);color:var(--g700)}.avb{background:var(--b100);color:var(--b600)}
.avt{background:var(--t100);color:var(--t500)}.ava{background:var(--a100);color:var(--a700)}
.pb{flex:1;min-width:0}
.pn{font-size:14px;font-weight:600}
.ps{font-size:12px;color:var(--tm);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.br{background:var(--r50);color:var(--r700)}.bg{background:var(--g100);color:var(--g700)}
.bb{background:var(--b50);color:var(--b600)}.ba{background:var(--a50);color:var(--a700)}
/* patient file */
.pfh{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pfav{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0}
.pfn{font-size:19px;font-weight:700}
.pfs{font-size:13px;color:var(--tm);margin-top:1px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdl)}
.ir:last-child{border-bottom:none}
.il{font-size:13px;color:var(--tm)}
.iv{font-size:13px;font-weight:600}
.ptrack{height:6px;background:var(--gr100);border-radius:3px;overflow:hidden;margin-top:5px}
.pfill{height:100%;background:linear-gradient(90deg,var(--g400),var(--t400));border-radius:3px}
.tent{padding:11px 0;border-bottom:1px solid var(--bdl)}
.tent:last-child{border-bottom:none}
.ttop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tnum{font-size:13px;font-weight:700;color:var(--ac)}
.tnotes{font-size:13px;color:var(--ts);line-height:1.6}
.tnotes b{font-weight:600;color:var(--tp)}
/* forms */
.fm{margin-bottom:12px}
.fl{font-size:12px;font-weight:600;color:var(--tm);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.4px}
.fi,.fsl,.ftx{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:var(--rmd);font-family:'Heebo',sans-serif;font-size:14px;background:var(--sf);color:var(--tp);outline:none;direction:rtl}
.fi:focus,.fsl:focus,.ftx:focus{border-color:var(--ac)}
.ftx{min-height:75px;resize:vertical}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--bd);cursor:pointer;background:var(--sf);color:var(--tp);font-family:'Heebo',sans-serif}
.chip.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn{width:100%;padding:12px;border-radius:var(--rmd);border:none;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:5px}
.bp{background:linear-gradient(135deg,var(--g500),var(--g600));color:#fff}
.bs{background:var(--sf2);color:var(--tp);border:1px solid var(--bd);margin-top:4px}
.bd2{background:var(--r50);color:var(--r700);border:1px solid var(--r100);margin-top:4px}
.bgcal{background:var(--b50);color:var(--b600);border:1px solid var(--b100);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:7px}
.bgoog{background:#fff;color:#444;border:1px solid #ddd;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:9px;font-size:14px}
.bbtn{display:flex;align-items:center;gap:5px;background:none;border:none;font-family:'Heebo',sans-serif;font-size:14px;color:var(--ac);cursor:pointer;padding:0 0 12px;font-weight:600}
.bbtn svg{width:17px;height:17px}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sbox{background:var(--sf);border-radius:var(--rmd);padding:12px;border:1px solid var(--bdl)}
.slbl{font-size:11px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.sval{font-size:24px;font-weight:700;color:var(--tp);margin-top:3px}
.sval.red{color:var(--r500)}
.login-sc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 24px;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--sf);border-radius:var(--rxl) var(--rxl) 0 0;padding:22px 18px 38px;width:100%;max-width:480px}
.sht{font-size:16px;font-weight:700;text-align:center;margin-bottom:7px}
.shs{font-size:14px;color:var(--tm);text-align:center;margin-bottom:18px;white-space:pre-line}
.aitem{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--bdl);cursor:pointer}
.aitem:last-child{border-bottom:none}
.atb{background:var(--sf2);border-radius:var(--rsm);padding:5px 8px;text-align:center;min-width:48px;flex-shrink:0}
.ath{font-size:14px;font-weight:700;color:var(--ac)}
.hidden{display:none!important}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="app">

<div id="lview" class="login-sc">
  <div style="font-size:60px;margin-bottom:20px">🌿</div>
  <div style="font-size:24px;font-weight:700;margin-bottom:7px">קליניקה</div>
  <div style="font-size:14px;color:var(--tm);margin-bottom:36px;line-height:1.6">ניהול מטופלים ותורים<br>מסונכרן בין טלפון למחשב</div>
  <button class="btn bgoog" onclick="doSignIn()" style="width:100%;max-width:280px;">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    כניסה עם חשבון גוגל
  </button>
  <div id="lerr" style="color:var(--r500);font-size:13px;margin-top:14px;display:none;"></div>
</div>

<div id="mview" class="hidden" style="display:flex;flex-direction:column;height:100%;">
  <div class="hdr">
    <div class="hlogo">
      <div class="hicon">🌿</div>
      <div><div class="htitle">קליניקה</div><div class="hsub" id="uname">...</div></div>
    </div>
    <div class="hacts">
      <button class="hb" onclick="showScreen('new-patient')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>מטופל</button>
      <button class="hb" onclick="openNewAppt()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>תור</button>
      <button class="hb" onclick="doSignOut()" style="background:rgba(255,255,255,0.1);padding:6px 8px;"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
    </div>
  </div>
  <div class="stbar"><div class="sdot" id="sdot"></div><span id="stxt" style="color:var(--tm)">מתחבר...</span></div>
  <div class="qbar">
    <button class="qb qbp" onclick="openNewAppt()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>קביעת תור חדש</button>
    <button class="qb qbs" onclick="showScreen('new-patient')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>מטופל חדש</button>
  </div>
  <div class="dalert hidden" id="dalert">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    <span id="datxt"></span><span class="dal" onclick="showScreen('debts')">לצפייה ←</span>
  </div>

  <div class="screens">

    <!-- יומן -->
    <div class="screen active" id="screen-calendar">
      <div class="card">
        <div class="vtabs">
          <button class="vt active" id="vt-month" onclick="setView('month')">חודשי</button>
          <button class="vt" id="vt-week" onclick="setView('week')">שבועי</button>
        </div>
        <div class="calh">
          <button class="caln" onclick="navCal(-1)">›</button>
          <div class="calt" id="calt"></div>
          <button class="caln" onclick="navCal(1)">‹</button>
        </div>
        <div id="calbody"></div>
        <!-- inline day panel -->
        <div class="daypanel" id="daypanel">
          <div class="dphead">
            <div class="dptitle" id="dptitle"></div>
            <button class="dpadd" id="dpadd-btn" onclick="openNewApptForDay()">+ תור</button>
          </div>
          <div id="dplist"></div>
        </div>
      </div>
    </div>

    <!-- מטופלים -->
    <div class="screen" id="screen-patients">
      <div class="swrap">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input class="si" type="text" placeholder="חיפוש לפי שם או טלפון..." oninput="renderPatients(this.value)"/>
      </div>
      <div class="card" style="padding:4px 14px;"><div id="plist"></div></div>
    </div>

    <!-- חובות -->
    <div class="screen" id="screen-debts">
      <div class="srow">
        <div class="sbox"><div class="slbl">סה"כ חובות</div><div class="sval red" id="stat-d">₪0</div></div>
        <div class="sbox"><div class="slbl">מטופלים חייבים</div><div class="sval" id="stat-n">0</div></div>
      </div>
      <div class="card" style="padding:4px 14px;"><div id="dlist"></div></div>
    </div>

    <!-- תיק מטופל -->
    <div class="screen" id="screen-patient-file">
      <button class="bbtn" id="fb-back" onclick="showScreen('patients')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>חזרה</button>
      <div id="pfile"></div>
    </div>

    <!-- מטופל חדש -->
    <div class="screen" id="screen-new-patient">
      <button class="bbtn" onclick="showScreen('patients')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>חזרה</button>

function sToD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function adMap(){const m={};(window.apts||[]).forEach(a=>{if(!m[a.date])m[a.date]=[];m[a.date].push(a);});return m;}

// ---- CALENDAR ----
function setView(v){
  calView=v;
  // reset to current week/month
  navDate=ltoday();
  document.getElementById('vt-month').classList.toggle('active',v==='month');
  document.getElementById('vt-week').classList.toggle('active',v==='week');
  renderCal();
}

function navCal(dir){
  if(calView==='month') navDate=new Date(navDate.getFullYear(),navDate.getMonth()+dir,1);
  else navDate=new Date(navDate.getFullYear(),navDate.getMonth(),navDate.getDate()+dir*7);
  renderCal();
}

function renderCal(){
  if(calView==='month') renderMonth();
  else renderWeek();
  renderDayPanel();
}

function renderMonth(){
  const y=navDate.getFullYear(),m=navDate.getMonth();
  document.getElementById('calt').textContent=`${HM[m]} ${y}`;
  const first=new Date(y,m,1);
  const sdow=first.getDay();
  const dim=new Date(y,m+1,0).getDate();
  const prevD=new Date(y,m,0).getDate();
  const ts=todayStr();const ss=dstr(selDate);
  const ad=adMap();
  let h='<div class="mgrid">';
  DS.forEach(d=>h+=`<div class="mdn">${d}</div>`);
  for(let i=0;i<sdow;i++) h+=`<div class="mday other"><div class="dn">${prevD-sdow+i+1}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${S2(m+1)}-${S2(d)}`;
    const isT=ds===ts,isSel=ds===ss&&!isT;
    const aps=ad[ds]||[];
    let dots='';
    if(aps.length){const hd=aps.some(a=>{const p=findP(a.patientId);return p&&p.treatments&&p.treatments.some(t=>!t.paid);});dots=`<div class="ddots"><div class="dd ${hd?'r':'g'}"></div></div>`;}
    h+=`<div class="mday${isT?' today':''}${isSel?' sel':''}" onclick="selDay('${ds}')"><div class="dn">${d}</div>${dots}</div>`;
  }
  const tot=sdow+dim;const rem=tot%7===0?0:7-(tot%7);
  for(let i=1;i<=rem;i++) h+=`<div class="mday other"><div class="dn">${i}</div></div>`;
  h+='</div>';
  document.getElementById('calbody').innerHTML=h;
}

function renderWeek(){
  const dow=navDate.getDay();
  const sun=new Date(navDate.getFullYear(),navDate.getMonth(),navDate.getDate()-dow);
  const sat=new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+6);
  document.getElementById('calt').textContent=`${sun.getDate()} ${HM[sun.getMonth()]} – ${sat.getDate()} ${HM[sat.getMonth()]}`;
  const ts=todayStr();const ss=dstr(selDate);const ad=adMap();
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+i);days.push(d);}
  let h='<div style="overflow-x:auto;"><div style="display:grid;grid-template-columns:40px repeat(7,1fr);margin-bottom:2px;">';
  h+='<div></div>';
  days.forEach(d=>{
    const ds=dstr(d);const isT=ds===ts;const isSel=ds===ss;
    h+=`<div style="text-align:center;padding:3px 1px;cursor:pointer;" onclick="selDay('${ds}')">
      <div style="font-size:10px;font-weight:600;color:${isT?'var(--ac)':'var(--tm)'};">${DS[d.getDay()]}</div>
      <div style="font-size:12px;font-weight:700;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto;${isT?'background:var(--ac);color:#fff;':isSel?'background:var(--g100);color:var(--g700);':''}">${d.getDate()}</div>
    </div>`;
  });
  h+='</div><div style="display:grid;grid-template-columns:40px repeat(7,1fr);">';
  HRS.forEach(hr=>{
    h+=`<div class="wtl">${hr}</div>`;
    days.forEach(d=>{
      const ds=dstr(d);
      const appt=(ad[ds]||[]).find(a=>a.time===`${hr}:00`);
      const isPast=ds<todayStr();
      if(appt){
        const p=findP(appt.patientId);
        const hd=p&&p.treatments&&p.treatments.some(t=>!t.paid);
        const isSer=p&&p.type==='series';
        const cls=hd?'wrd':isSer?'wgr':'wbl';
        const nm=p?p.name.split(' ')[0]:'';
        h+=`<div class="wcell" onclick="weekCellClick('${appt.patientId}','${ds}','${hr}:00')"><div class="wappt ${cls}">${nm}</div></div>`;
      } else {
        if(isPast){
          h+=`<div class="wcell" style="background:var(--sf2);opacity:0.5;cursor:default;"></div>`;
        } else {
          h+=`<div class="wcell" onclick="openNewApptAt('${ds}','${hr}:00')"></div>`;
        }
      }
    });
  });
  h+='</div></div>';
  document.getElementById('calbody').innerHTML=h;
}

function weekCellClick(pid,ds,time){
  const isPast=ds<todayStr();
  if(isPast){openPatient(pid);}
  else{selDay(ds);openPatient(pid);}
}

function renderDayPanel(){
  const ds=dstr(selDate);
  const ad=adMap();
  const dayApts=(ad[ds]||[]).sort((a,b)=>a.time.localeCompare(b.time));
  const isPast=ds<todayStr();
  const isToday=ds===todayStr();
  const d=selDate;
  document.getElementById('dptitle').textContent=`${DFL[d.getDay()]}, ${d.getDate()} ${HM[d.getMonth()]}`;
  // hide add button for past days
  document.getElementById('dpadd-btn').style.display=isPast?'none':'block';

  if(!dayApts.length){
    document.getElementById('dplist').innerHTML=`<div style="color:var(--tm);font-size:13px;padding:8px 0;text-align:center;">${isPast?'לא היו תורים ביום זה':'אין תורים ביום זה'}</div>`;
    return;
  }
  document.getElementById('dplist').innerHTML=dayApts.map(a=>{
    const p=findP(a.patientId);
    const hd=p&&p.treatments&&p.treatments.some(t=>!t.paid);
    return `<div class="aitem" onclick="openPatient('${a.patientId}')">
      <div class="atb"><div class="ath">${a.time}</div></div>
      <div class="pav ${AVC[(p?p.color:0)%4]}" style="width:36px;height:36px;font-size:13px;">${p?p.name.charAt(0):'?'}</div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${p?p.name:''}</div><div style="font-size:11px;color:var(--tm);">${p?p.problem:''}</div></div>
      ${hd?'<span class="badge br">חוב</span>':''}
      ${!isPast?`<button onclick="event.stopPropagation();delAppt('${a.id}','${a.patientId}')" style="background:var(--r50);border:none;border-radius:5px;padding:3px 8px;font-size:11px;color:var(--r700);cursor:pointer;font-family:Heebo,sans-serif;flex-shrink:0;">ביטול</button>`:''}
    </div>`;
  }).join('');
}

function selDay(ds){selDate=sToD(ds);navDate=new Date(selDate);renderCal();}
function openNewApptForDay(){openNewApptAt(dstr(selDate),'10:00');}
function openNewApptAt(ds,time){openNewAppt();document.getElementById('na-dt').value=ds;document.getElementById('na-tm').value=time;}

// ---- PATIENTS ----
function findP(id){return (window.pts||[]).find(x=>String(x.id)===String(id));}

function renderPatients(filter=''){
  const list=document.getElementById('plist');
  const filtered=(window.pts||[]).filter(p=>p.name.includes(filter)||(p.phone&&p.phone.includes(filter)));
  if(!filtered.length){list.innerHTML='<div style="color:var(--tm);font-size:13px;padding:14px;text-align:center;">לא נמצאו מטופלים</div>';return;}
  filtered.sort((a,b)=>a.name.localeCompare(b.name,'he'));
  list.innerHTML=filtered.map(p=>{
    const hd=p.treatments&&p.treatments.some(t=>!t.paid);
    const last=p.treatments&&p.treatments.length?p.treatments[p.treatments.length-1].date:null;
    const si=p.type==='series'?`${p.seriesUsed||0}/5`:'';
    return `<div class="pi" onclick="openPatient('${p.id}')">
      <div class="pav ${AVC[(p.color||0)%4]}">${p.name.charAt(0)}</div>
      <div class="pb"><div class="pn">${p.name}</div><div class="ps">${p.problem||''}${p.phone?' · '+p.phone:''}</div></div>
      <div class="pr">${hd?'<span class="badge br">חוב</span>':''}${si?`<span class="badge bg">סדרה ${si}</span>`:''}${last?`<span style="font-size:11px;color:var(--tm);">${last}</span>`:''}</div>
    </div>`;
  }).join('');
}

window.openPatient=function(id){
  id=String(id);curPid=id;
  const p=findP(id);if(!p)return;
  const hd=p.treatments&&p.treatments.some(t=>!t.paid);
  const td=p.treatments?p.treatments.filter(t=>!t.paid).reduce((s,t)=>s+(t.amount||0),0):0;
  const ts=todayStr();
  const upcoming=(window.apts||[]).filter(a=>String(a.patientId)===id&&a.date>=ts).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,3);
  const upH=upcoming.length?upcoming.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdl);">
    <span style="font-size:12px;color:var(--tm);min-width:80px;">${a.date}</span>
    <span style="font-size:13px;font-weight:600;color:var(--ac);">${a.time}</span>
    <button onclick="delAppt('${a.id}','${id}')" style="margin-right:auto;background:var(--r50);border:none;border-radius:5px;padding:3px 9px;font-size:11px;color:var(--r700);cursor:pointer;font-family:Heebo,sans-serif;">ביטול תור</button>
  </div>`).join(''):'<div style="color:var(--tm);font-size:13px;padding:7px 0;">אין תורים קרובים</div>';
  let serH='';
  if(p.type==='series'){const u=p.seriesUsed||0,pct=Math.round((u/5)*100);serH=`<div class="ir"><span class="il">סדרה</span><span class="iv">${u} מתוך 5</span></div><div style="margin-top:5px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tm);margin-bottom:4px;"><span>התקדמות</span><span>${pct}%</span></div><div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div></div>`;}
  const trH=(p.treatments&&p.treatments.length)?[...p.treatments].reverse().map(t=>`<div class="tent">
    <div class="ttop">
      <span class="tnum">טיפול ${t.num}</span>
      <div style="display:flex;align-items:center;gap:5px;">
        ${t.paid?'<span class="badge bg">שולם</span>':'<span class="badge br">לא שולם</span>'}
        <span style="font-size:11px;color:var(--tm);">${t.date}</span>
        <button onclick="openEditTreat('${id}',${t.num})" style="background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:Heebo,sans-serif;color:var(--tp);">עריכה</button>
      </div>
    </div>
    <div class="tnotes">
      ${t.found?`<div><b>ממצא:</b> ${t.found}</div>`:''}
      ${t.done?`<div><b>טיפול:</b> ${t.done}</div>`:''}
      ${t.recommend?`<div><b>המלצה:</b> ${t.recommend}</div>`:''}
      ${t.method?`<div><b>תשלום:</b> ${t.method}</div>`:''}
    </div>
    ${!t.paid?`<button onclick="mkPaid('${id}',${t.num})" style="margin-top:7px;padding:5px 13px;border-radius:20px;border:1.5px solid var(--ac);background:none;color:var(--ac);font-family:Heebo,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">✓ סמן כשולם</button>`:''}
  </div>`).join(''):'<div style="color:var(--tm);font-size:13px;padding:7px 0;">אין טיפולים עדיין</div>';

  document.getElementById('pfile').innerHTML=`
    <div class="card">
      <div class="pfh">
        <div class="pfav ${AVC[(p.color||0)%4]}">${p.name.charAt(0)}</div>
        <div style="flex:1;"><div class="pfn">${p.name}</div><div class="pfs">${p.phone||''}</div></div>
        <button onclick="openEdit('${id}')" style="background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rsm);padding:5px 12px;font-family:Heebo,sans-serif;font-size:12px;cursor:pointer;color:var(--tp);font-weight:600;">עריכה</button>
      </div>
      ${hd?`<div style="background:var(--r50);border:1px solid var(--r100);border-radius:var(--rsm);padding:9px 11px;margin-bottom:11px;font-size:13px;color:var(--r700);">⚠ חוב פתוח: ₪${td.toLocaleString()}</div>`:''}
      <div class="ir"><span class="il">גיל</span><span class="iv">${p.age||'—'}</span></div>
      <div class="ir"><span class="il">בעיה עיקרית</span><span class="iv">${p.problem||'—'}</span></div>
      <div class="ir"><span class="il">סוג טיפול</span><span class="iv">${p.type==='series'?'סדרה (5 טיפולים)':'יחיד'}</span></div>
      <div class="ir"><span class="il">מחיר לטיפול</span><span class="iv">₪${(p.price||350).toLocaleString()}</span></div>
      ${serH}
    </div>
    <div class="card">
      <div class="ct">תורים קרובים</div>${upH}
      <button onclick="openNewApptFor('${id}')" style="margin-top:9px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--rsm);padding:7px 12px;font-family:Heebo,sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--g700);width:100%;">+ קבע תור חדש למטופל זה</button>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="ct" style="margin-bottom:0;">היסטוריית טיפולים</div>
        <button onclick="openAddTreat('${id}')" style="background:var(--ac);color:#fff;border:none;border-radius:var(--rsm);padding:6px 13px;font-family:Heebo,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">+ רישום</button>
      </div>
      ${trH}
    </div>
    <button class="btn bgcal" onclick="openPaperless('${p.name}')">🧾 פתח קבלה ב-Paperless</button>
  `;
  showScreen('patient-file');
};

window.delAppt=async(aid,pid)=>{
  if(!confirm('לבטל את התור?'))return;
  window.apts=(window.apts||[]).filter(a=>String(a.id)!==String(aid));
  await window.fbDelA(aid);
  openPatient(pid);render();
};

window.mkPaid=async(pid,num)=>{
  const p=findP(pid);if(!p)return;
  const t=p.treatments.find(x=>x.num===num);if(t){t.paid=true;t.method=t.method||'מזומן';}
  await window.fbSaveP(p);openPatient(pid);
};

function openEdit(id){
  const p=findP(id);if(!p)return;
  document.getElementById('ep-id').value=id;
  document.getElementById('ep-nm').value=p.name;
  document.getElementById('ep-ph').value=p.phone||'';
  document.getElementById('ep-ag').value=p.age||'';
  document.getElementById('ep-pr').value=p.problem||'';
  document.getElementById('ep-px').value=p.price||350;
  document.getElementById('ep-bk').onclick=()=>openPatient(id);
  showScreen('edit-patient');
}

async function saveEdit(){
  const id=String(document.getElementById('ep-id').value);
  const p=findP(id);if(!p)return;
  p.name=document.getElementById('ep-nm').value.trim()||p.name;
  p.phone=document.getElementById('ep-ph').value.trim();
  p.age=document.getElementById('ep-ag').value;
  p.problem=document.getElementById('ep-pr').value.trim();
  p.price=parseInt(document.getElementById('ep-px').value)||350;
  await window.fbSaveP(p);openPatient(id);
}

function confirmDel(){
  const id=String(document.getElementById('ep-id').value);
  const p=findP(id);delPid=id;
  document.getElementById('del-sub').textContent=`האם למחוק את ${p?p.name:'המטופל'}?\nפעולה זו אינה ניתנת לביטול.`;
  document.getElementById('del-ov').classList.remove('hidden');
}

async function doDelete(){
  window.pts=(window.pts||[]).filter(x=>String(x.id)!==delPid);
  window.apts=(window.apts||[]).filter(a=>String(a.patientId)!==delPid);
  await window.fbDelP(delPid);
  document.getElementById('del-ov').classList.add('hidden');
  render();showScreen('patients');
}

function closeDelOv(e){if(e.target===document.getElementById('del-ov'))document.getElementById('del-ov').classList.add('hidden');}

// ---- DEBTS ----
function renderDebts(){
  const drs=(window.pts||[]).filter(p=>p.treatments&&p.treatments.some(t=>!t.paid));
  const tot=drs.reduce((s,p)=>s+p.treatments.filter(t=>!t.paid).reduce((ss,t)=>ss+(t.amount||0),0),0);
  document.getElementById('stat-d').textContent='₪'+tot.toLocaleString();
  document.getElementById('stat-n').textContent=drs.length;
  const list=document.getElementById('dlist');
  if(!drs.length){list.innerHTML='<div style="text-align:center;padding:22px;color:var(--tm);font-size:14px;">✓ אין חובות פתוחים</div>';return;}
  list.innerHTML=drs.map(p=>{
    const u=p.treatments.filter(t=>!t.paid);const a=u.reduce((s,t)=>s+(t.amount||0),0);
    return `<div class="pi" onclick="openPatient('${p.id}')">
      <div class="pav ${AVC[(p.color||0)%4]}">${p.name.charAt(0)}</div>
      <div class="pb"><div class="pn">${p.name}</div><div class="ps">${u.length} טיפולים לא שולמו</div></div>
      <div style="font-size:15px;font-weight:700;color:var(--r500);">₪${a.toLocaleString()}</div>
    </div>`;
  }).join('');
}

// ---- ADD PATIENT ----
function setNpType(t){npType=t;document.getElementById('np-sg').classList.toggle('active',t==='single');document.getElementById('np-sr').classList.toggle('active',t==='series');}
async function addPatient(){
  const name=document.getElementById('np-nm').value.trim();if(!name){alert('נא להזין שם');return;}
  const p={id:String(Date.now()),name,phone:document.getElementById('np-ph').value.trim(),age:document.getElementById('np-ag').value,problem:document.getElementById('np-pr').value.trim(),type:npType,price:parseInt(document.getElementById('np-px').value)||350,seriesUsed:0,color:(window.pts||[]).length%4,treatments:[]};
  window.pts=[...(window.pts||[]),p];
  await window.fbSaveP(p);
  ['np-nm','np-ph','np-ag','np-pr'].forEach(i=>document.getElementById(i).value='');
  showScreen('patients');
}

// ---- APPOINTMENTS ----
function openNewAppt(){
  showScreen('new-appointment');
  const sel=document.getElementById('na-pt');
  sel.innerHTML='<option value="">בחר מטופל...</option>'+(window.pts||[]).sort((a,b)=>a.name.localeCompare(b.name,'he')).map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('na-dt').value=todayStr();
  document.getElementById('gcal-btn').classList.add('hidden');
  document.getElementById('na-err').style.display='none';
  document.getElementById('na-nt').value='';
}

function openNewApptFor(id){openNewAppt();document.getElementById('na-pt').value=String(id);}

async function addAppointment(){
  const pid=String(document.getElementById('na-pt').value);
  const date=document.getElementById('na-dt').value;
  const time=document.getElementById('na-tm').value;
  const err=document.getElementById('na-err');
  if(!pid){err.textContent='נא לבחור מטופל';err.style.display='block';return;}
  if(!date){err.textContent='נא לבחור תאריך';err.style.display='block';return;}
  if(date<todayStr()){err.textContent='לא ניתן לקבוע תור בתאריך שעבר';err.style.display='block';return;}
  // check duplicate
  const ad=adMap();
  const exists=(ad[date]||[]).some(a=>a.time===time);
  if(exists){err.textContent=`כבר יש תור בשעה ${time} בתאריך זה`;err.style.display='block';return;}
  err.style.display='none';
  const a={id:String(Date.now()),patientId:pid,date,time,notes:document.getElementById('na-nt').value};
  window.apts=[...(window.apts||[]),a];lastAppt=a;
  await window.fbSaveA(a);
  selDate=sToD(date);navDate=new Date(selDate);
  document.getElementById('gcal-btn').classList.remove('hidden');
  renderCal();
}

function openGcal(){
  if(!lastAppt)return;
  const p=findP(lastAppt.patientId);
  const[h,m]=lastAppt.time.split(':').map(Number);
  const d=sToD(lastAppt.date);
  const pad=n=>String(n).padStart(2,'0');
  const fmt=(d,h,m)=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(h)}${pad(m)}00`;
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('טיפול — '+(p?p.name:''))}&dates=${fmt(d,h,m)}/${fmt(d,h+1,m)}&details=${encodeURIComponent(p?p.problem:'')}`,'_blank');
}

// ---- TREATMENT ----
function openAddTreat(id){
  trPid=String(id);editTrNum=null;
  const p=findP(id);
  document.getElementById('tr-ttl').textContent=`רישום טיפול — ${p?p.name:''}`;
  document.getElementById('tr-eid').value='';
  document.getElementById('tr-bk').onclick=()=>openPatient(id);
  document.getElementById('tr-dt').value=todayStr();
  ['tr-fd','tr-dn','tr-rc'].forEach(i=>document.getElementById(i).value='');
  trPay='paid';
  document.getElementById('tr-pd').classList.add('active');document.getElementById('tr-up').classList.remove('active');
  document.getElementById('tr-mw').style.display='block';
  document.querySelectorAll('#tr-mw .chip').forEach((c,i)=>c.classList.toggle('active',i===0));
  showScreen('add-treatment');
}

function openEditTreat(pid,num){
  trPid=String(pid);editTrNum=num;
  const p=findP(pid);if(!p)return;
  const t=p.treatments.find(x=>x.num===num);if(!t)return;
  document.getElementById('tr-ttl').textContent=`עריכת טיפול ${num} — ${p.name}`;
  document.getElementById('tr-eid').value=num;
  document.getElementById('tr-bk').onclick=()=>openPatient(pid);
  document.getElementById('tr-dt').value=t.date;
  document.getElementById('tr-fd').value=t.found||'';
  document.getElementById('tr-dn').value=t.done||'';
  document.getElementById('tr-rc').value=t.recommend||'';
  trPay=t.paid?'paid':'unpaid';
  document.getElementById('tr-pd').classList.toggle('active',t.paid);
  document.getElementById('tr-up').classList.toggle('active',!t.paid);
  document.getElementById('tr-mw').style.display=t.paid?'block':'none';
  const methods=['מזומן','העברה','אשראי','ביט'];
  document.querySelectorAll('#tr-mw .chip').forEach((c,i)=>c.classList.toggle('active',methods[i]===(t.method||'מזומן')));
  showScreen('add-treatment');
}

function setTrPay(v){trPay=v;document.getElementById('tr-pd').classList.toggle('active',v==='paid');document.getElementById('tr-up').classList.toggle('active',v==='unpaid');document.getElementById('tr-mw').style.display=v==='paid'?'block':'none';}
function selPM(el){document.querySelectorAll('#tr-mw .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');}

async function saveTreatment(){
  const p=findP(trPid);if(!p)return;
  p.treatments=p.treatments||[];

  // Prevent future date
  const tdate=document.getElementById('tr-dt').value;
  if(tdate>todayStr()){alert('לא ניתן לרשום טיפול לתאריך עתידי');return;}

  const am=document.querySelector('#tr-mw .chip.active');
  const tdata={date:tdate,found:document.getElementById('tr-fd').value,done:document.getElementById('tr-dn').value,recommend:document.getElementById('tr-rc').value,paid:trPay==='paid',amount:p.price||350,method:trPay==='paid'?(am?am.textContent:'מזומן'):''};

  if(editTrNum!==null){
    // edit existing
    const idx=p.treatments.findIndex(x=>x.num===editTrNum);
    if(idx>=0){p.treatments[idx]={...p.treatments[idx],...tdata};}
  } else {
    // new treatment
    const num=p.treatments.length+1;
    p.treatments.push({num,...tdata});
    if(p.type==='series')p.seriesUsed=(p.seriesUsed||0)+1;
  }
  await window.fbSaveP(p);openPatient(trPid);
}

function openPaperless(name){alert(`פתח את אפליקציית Paperless וצור קבלה עבור:\n${name}`);}

// ---- SCREEN NAV ----
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  const s=document.getElementById('screen-'+name);if(s)s.classList.add('active');
  const nm={calendar:'nav-cal',patients:'nav-pts',debts:'nav-dbt'};
  if(nm[name])document.getElementById(nm[name]).classList.add('active');
  if(name==='calendar')renderCal();
  if(name==='patients')renderPatients();
}

// expose
window.showScreen=showScreen;window.setView=setView;window.navCal=navCal;window.selDay=selDay;
window.openNewApptAt=openNewApptAt;window.openNewAppt=openNewAppt;window.addAppointment=addAppointment;
window.openGcal=openGcal;window.renderPatients=renderPatients;window.addPatient=addPatient;
window.openEdit=openEdit;window.saveEdit=saveEdit;window.confirmDel=confirmDel;window.doDelete=doDelete;
window.closeDelOv=closeDelOv;window.openAddTreat=openAddTreat;window.openEditTreat=openEditTreat;
window.setTrPay=setTrPay;window.selPM=selPM;window.saveTreatment=saveTreatment;
window.setNpType=setNpType;window.openPaperless=openPaperless;window.openNewApptFor=openNewApptFor;
window.weekCellClick=weekCellClick;window.openNewApptForDay=openNewApptForDay;window.mkPaid=mkPaid;
window.delAppt=delAppt;
</script>
</body>
</html>
